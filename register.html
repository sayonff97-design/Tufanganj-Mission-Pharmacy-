<!DOCTYPE html>
<html>
<head>
  <title>User Registration</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body{
      font-family:Arial;
      background:#f4f4f4;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      margin:0;
    }
    .container{
      background:white;
      padding:30px;
      border-radius:12px;
      width:380px;
      box-shadow:0 0 15px rgba(0,0,0,.15);
    }
    h2{ text-align:center; color:#0d6efd; }
    input{
      width:100%;
      padding:12px;
      margin:8px 0;
      border:1px solid #ccc;
      border-radius:5px;
    }
    button{
      width:100%;
      padding:12px;
      background:#0d6efd;
      color:white;
      border:none;
      border-radius:5px;
      cursor:pointer;
    }
  </style>

  <!-- Firebase CDN -->
  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-auth.js"></script>
</head>

<body>

<div class="container">
  <h2>Create Account</h2>

  <form id="registerForm">
    <input type="text" id="name" placeholder="Full Name" required>
    <input type="tel" id="phone" placeholder="Phone Number" required>
    <input type="email" id="email" placeholder="Email Address" required>
    <input type="password" id="password" placeholder="Password" required>
    <input type="password" id="confirm" placeholder="Confirm Password" required>

    <button type="submit">Register</button>
  </form>

  <div style="text-align:center;margin-top:10px;">
    <a href="login.html">Already have account?</a>
  </div>
</div>

<script>
  // Firebase config
  const firebaseConfig = {
    apiKey: "AIzaSyAnQj7leUb86PwvOOhIIBhkQja0fvLzDNs",
    authDomain: "tufanganj-mission-pharmacy.firebaseapp.com",
    projectId: "tufanganj-mission-pharmacy",
    appId: "1:73171110361:web:0b519bdcd67bff4bac71c8"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();

  // Register logic
  document.getElementById("registerForm").addEventListener("submit", function(e){
    e.preventDefault();

    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;
    let confirm = document.getElementById("confirm").value;

    if(password !== confirm){
      alert("Passwords do not match!");
      return;
    }

    auth.createUserWithEmailAndPassword(email, password)
      .then(() => {
        alert("Registration Successful!");
        window.location.href = "login.html";
      })
      .catch((error) => {
        alert(error.message);
      });
  });
</script>

</body>
</html>
