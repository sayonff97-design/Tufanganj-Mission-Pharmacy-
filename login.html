
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tufanganj Mission Pharmacy - Login</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#f4f8fc;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-box{
background:white;
padding:30px;
width:350px;
border-radius:12px;
box-shadow:0 0 15px rgba(0,0,0,0.15);
}

h2{
text-align:center;
margin-bottom:20px;
color:#0d6efd;
}

input{
width:100%;
padding:12px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:6px;
}

button{
width:100%;
padding:12px;
background:#0d6efd;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#0b5ed7;
}

.links{
text-align:center;
margin-top:15px;
}

.links a{
text-decoration:none;
color:#0d6efd;
font-weight:bold;
}

.links a:hover{
text-decoration:underline;
}

</style>
</head>

<body>

<div class="login-box">

<h2>User Login</h2>

<form>

<input type="email" placeholder="Enter Email" required>

<input type="password" placeholder="Enter Password" required>

<button type="submit">Login</button>

</form>

<div class="links">
<p>
Don't have an account?
</p>

<br>

<a href="register.html">
Create New Account
</a>

</div>

</div>

</body>
</html>
